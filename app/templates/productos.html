<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-card">
        <h1>Productos</h1>
        <form action="/productos" method="post">
            <label>Nombre</label>
            <input type="text" name="nombre" required>

            <label>Precio</label>
            <input type="number" step="0.01" name="precio" required>

            <label>Unidades por presentación</label>
            <input type="number" name="unidades_por_presentacion" required>

            <button type="submit">Guardar producto</button>
        </form>

        <table>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Unidades</th>
            </tr>
            {% for p in productos %}
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.nombre }}</td>
                <td>{{ p.precio }}</td>
                <td>{{ p.unidades_por_presentacion }}</td>
            </tr>
            {% endfor %}
        </table>

        <a href="/dashboard" class="btn-volver">Volver</a>
    </div>
</div>
</body>
</html>
