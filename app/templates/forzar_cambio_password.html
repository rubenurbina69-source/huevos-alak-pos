<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio obligatorio de contraseña</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .alerta-box {
            background: #fff4e5;
            border: 1px solid #f2c46d;
            color: #8a5a00;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .error-box {
            color: #b00020;
            font-weight: bold;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-card">
        <h1>Cambio obligatorio de contraseña</h1>

        <div class="alerta-box">
            Tu contraseña fue modificada por un administrador.  
            Por seguridad, debes cambiarla antes de continuar usando el sistema.
        </div>

        {% if error %}
            <p class="error-box">{{ error }}</p>
        {% endif %}

        <form action="/mi-cuenta/forzar-cambio" method="post">
            <label>Contraseña actual</label>
            <input type="password" name="password_actual" required>

            <label>Nueva contraseña</label>
            <input type="password" name="password_nueva" required>

            <label>Confirmar nueva contraseña</label>
            <input type="password" name="password_confirmacion" required>

            <button type="submit">Actualizar contraseña</button>
        </form>
    </div>
</div>
</body>
</html>
