<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetear contraseña</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .error-box {
            color: #b00020;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .ok-box {
            color: green;
            font-weight: bold;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-card">
        <h1>Restablecer contraseña</h1>
        <p><strong>Administrador:</strong> {{ usuario.nombre }}</p>
        <p><strong>Usuario seleccionado:</strong> {{ user.nombre }} ({{ user.usuario }})</p>

        {% if error %}
            <p class="error-box">{{ error }}</p>
        {% endif %}

        {% if mensaje %}
            <p class="ok-box">{{ mensaje }}</p>
        {% endif %}

        <form action="/usuarios/reset-password/{{ user.id }}" method="post">
            <label>Nueva contraseña</label>
            <input type="password" name="nueva_password" required>

            <label>Confirmar nueva contraseña</label>
            <input type="password" name="confirmar_password" required>

            <button type="submit">Guardar nueva contraseña</button>
        </form>

        <a href="/usuarios" class="btn-volver">Volver a usuarios</a>
    </div>
</div>
</body>
</html>
